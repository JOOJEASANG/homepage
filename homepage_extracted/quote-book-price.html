<body class="antialiased selection:bg-brand-100 selection:text-brand-900">

    <div id="toast-container" class="fixed top-6 right-6 z-[9999] flex flex-col gap-3"></div>

    <div class="container mx-auto p-4 sm:p-6 lg:p-8 min-h-screen flex flex-col">
        <!-- 메인 컨텐츠 영역 -->
        <div id="page-content" class="bg-white p-6 sm:p-8 rounded-2xl shadow-xl w-full max-w-screen-2xl mx-auto flex flex-col border border-slate-200 flex-grow relative overflow-hidden">

                <h1 class="text-xl font-bold text-slate-800">관리자 권한 확인 중...</h1>

<script>
/** 권한/보안 흐름 고정 v5 (수정5차)
 * - admin은 기본적으로 admin.html로 강제 유도
 * - 단, 견적 수정 목적의 adminEdit/admin_edit 플래그가 있으면 quote-book/quote-print 접근 허용
 * - mypage는 회원/비회원 세션만 허용, admin은 admin으로
 * - 헤더/모바일 UX 통일 + 완전 로그아웃(비회원 조회키 포함)
 */
(function(){
  const CLEAR_KEYS = ['guestLookupKey', 'guestLookupKeyLegacy', 'guestName', 'guestContact', 'guestContactHyphen', 'guestContactRaw', 'guestPwLast4', 'userRole', 'quoteToReload', 'quoteDraft', 'lastQuoteDraft', 'postLoginRedirect', 'temp_quote_print', 'autoSubmitBook', 'notice_popup_hide'];

  function currentFile() {
    try {
      const p = (location.pathname||"").split("/").pop();
      return p || "index.html";
    } catch(e) { return "index.html"; }
  }

  function getGuestKey() {
    return sessionStorage.getItem("guestLookupKey")
        || localStorage.getItem("guestLookupKey")
        || sessionStorage.getItem("guestLookupKeyLegacy")
        || localStorage.getItem("guestLookupKeyLegacy")
        || "";
  }

  function getRole() {
    try { return (localStorage.getItem("userRole")||"").toLowerCase(); }
    catch(e) { return ""; }
  }

  function setRole(role) {
    try {
      if (!role) return;
      localStorage.setItem("userRole", String(role).toLowerCase());
    } catch(e) {}
  }

  function setPostLoginRedirect(file) {
    try { sessionStorage.setItem("postLoginRedirect", file); } catch(e) {}
  }

  function clearClientState() {
    try { sessionStorage.clear(); } catch(e) {}
    try {
      CLEAR_KEYS.forEach(k => { try { localStorage.removeItem(k); } catch(e) {} });
    } catch(e) {}
  }

  async function firebaseSignOutSafe() {
    try {
      if (window.auth && window.signOut) {
        await window.signOut(window.auth);
        return;
      }
      if (window.__firebaseAuth && window.__firebaseAuth.signOut) {
        await window.__firebaseAuth.signOut();
        return;
      }
    } catch(e) {}
  }

  async function hardLogout(redirectUrl = 'index.html') {
  // Clear UI/session state
  try { sessionStorage.clear(); } catch (e) {}
  try {
    // Role / user
    localStorage.removeItem('userRole');
    sessionStorage.removeItem('userRole');
    localStorage.removeItem('userName');
    sessionStorage.removeItem('userName');

    // Quote draft / routing
    localStorage.removeItem('quoteToReload');
    localStorage.removeItem('quoteDraft');
    localStorage.removeItem('lastQuoteDraft');
    localStorage.removeItem('postLoginRedirect');

    // Guest lookup keys
    localStorage.removeItem('guestLookupKey');
    localStorage.removeItem('guestLookupKeyLegacy');
    localStorage.removeItem('guestName');
    localStorage.removeItem('guestContact');
    localStorage.removeItem('guestContactRaw');
    localStorage.removeItem('guestContactHyphen');
    localStorage.removeItem('guestPwLast4');
  } catch (e) {}

  // Optional: clear last quote cache keys when present
  try {
    if (typeof __LAST_QUOTE_CACHE_KEY_BOOK !== 'undefined') {
      try { sessionStorage.removeItem(__LAST_QUOTE_CACHE_KEY_BOOK); } catch (e) {}
      try { localStorage.removeItem(__LAST_QUOTE_CACHE_KEY_BOOK); } catch (e) {}
    }
    if (typeof __LAST_QUOTE_CACHE_KEY_PRINT !== 'undefined') {
      try { sessionStorage.removeItem(__LAST_QUOTE_CACHE_KEY_PRINT); } catch (e) {}
      try { localStorage.removeItem(__LAST_QUOTE_CACHE_KEY_PRINT); } catch (e) {}
    }
  } catch (e) {}

  // Optional: unsubscribe snapshot listeners if present (mypage 등)
  try { if (typeof unsubscribeQuotesSnapshot === 'function') unsubscribeQuotesSnapshot(); } catch (e) {}
  try { if (typeof unsubscribeQuotesSnapshot !== 'undefined') unsubscribeQuotesSnapshot = null; } catch (e) {}

  // Admin safety: 관리자에서 로그아웃한 직후 메인에서 1회 익명로그인 억제
  try {
    const p = (location && location.pathname ? location.pathname : '').toLowerCase();
    if (p.endsWith('/admin.html') || p.endsWith('admin.html')) {
      sessionStorage.setItem('suppressAnonOnce', '1');
    }
  } catch (e) {}

  // Firebase sign out (module auth or window.auth)
  try {
    if (typeof auth !== 'undefined' && auth && typeof signOut === 'function') {
      await signOut(auth);
    } else if (window.auth && typeof window.auth.signOut === 'function') {
      await window.auth.signOut();
    }
  } catch (e) {
    console.warn('signOut failed:', e);
  }

  location.replace(redirectUrl || 'index.html');
}
  window.__hardLogout = () => hardLogout("index.html");

  function getSessionState() {
    const guestKey = getGuestKey();
    const u = window.__currentUser || null;
    const isAnon = !!(u && u.isAnonymous);
    const isLoggedIn = !!(u && u.uid && !u.isAnonymous);
    const hasSession = !!guestKey || isAnon || isLoggedIn;
    return { guestKey, isAnon, isLoggedIn, hasSession, user:u };
  }

  function updateAuthLabels() {
    const st = getSessionState();
    const label = st.hasSession ? "로그아웃" : "로그인";
    const btn = document.getElementById("auth-action-btn");
    const mb = document.getElementById("mobile-auth-btn");
    if (btn) btn.textContent = label;
    if (mb) mb.textContent = label;

    const role = getRole();
    const w = document.getElementById("welcome-message");
    if (w) {
      if (role === "admin") { w.textContent = "관리자"; w.classList.remove("hidden"); }
      else if (st.isLoggedIn) { w.textContent = (st.user && st.user.email) ? st.user.email : "회원"; w.classList.remove("hidden"); }
      else if (st.guestKey) { w.textContent = "비회원"; w.classList.remove("hidden"); }
      else { w.textContent = ""; w.classList.add("hidden"); }
    }
  }

  function goMypageOrLogin() {
    const st = getSessionState();
    if (st.guestKey) location.href = "mypage.html?guest=1";
    else if (st.isLoggedIn) location.href = "mypage.html";
    else {
      setPostLoginRedirect("mypage.html");
      location.href = "login.html";
    }
  }

  async function authAction() {
    const st = getSessionState();
    if (st.hasSession) await hardLogout("index.html");
    else {
      setPostLoginRedirect(currentFile());
      location.href = "login.html";
    }
  }

  function bindClickOverride(id, handler) {
    const el = document.getElementById(id);
    if (!el) return;
    el.addEventListener("click", (e) => {
      try {
        e.preventDefault();
        e.stopPropagation();
        e.stopImmediatePropagation();
      } catch(_) {}
      handler();
    }, true);
  }

  function allowAdminEditHere() {
    const file = currentFile();
    const params = new URLSearchParams(location.search || "");
    const flag = (params.get("adminEdit")==="1") || (params.get("admin_edit")==="1");
    if (!flag) return false;
    return (file === "quote-book.html" || file === "quote-print.html" || file === "quote-book-price.html" || file === "quote-print-price.html");
  }

  function applyRoleGuards() {
    const file = currentFile();
    const role = getRole();
    const st = getSessionState();

    if (role === "admin" && file !== "admin.html" && file !== "login.html") {
      if (!allowAdminEditHere()) {
        location.replace("admin.html");
        return;
      }
    }

    if (file === "admin.html") {
      if (role !== "admin") {
        location.replace("index.html");
        return;
      }
    }

    if (file === "mypage.html") {
      if (role === "admin") {
        location.replace("admin.html");
        return;
      }
      if (!st.hasSession) {
        location.replace("index.html");
        return;
      }
    }
  }

  document.addEventListener("DOMContentLoaded", () => {
    bindClickOverride("user-menu-btn", goMypageOrLogin);
    const authBtn = document.getElementById("auth-action-btn");
    if (authBtn) authBtn.addEventListener("click", (e) => { try{e.preventDefault();}catch(_){} authAction(); });
    const m1 = document.getElementById("mobile-mypage-btn");
    if (m1) m1.addEventListener("click", (e)=>{ try{e.preventDefault();}catch(_){} goMypageOrLogin(); });
    const m2 = document.getElementById("mobile-auth-btn");
    if (m2) m2.addEventListener("click", (e)=>{ try{e.preventDefault();}catch(_){} authAction(); });

    updateAuthLabels();
    applyRoleGuards();
  });

  window.__setAuthState = function(user, role) {
    window.__currentUser = user || null;
    if (role) setRole(role);
    updateAuthLabels();
    applyRoleGuards();
  };

  setTimeout(() => {
    try {
      if (window.onAuthStateChanged && window.auth) {
        window.onAuthStateChanged(window.auth, (u) => {
          window.__currentUser = u || null;
          updateAuthLabels();
          applyRoleGuards();
        });
      } else {
        updateAuthLabels();
        applyRoleGuards();
      }
    } catch(e) {
      updateAuthLabels();
      applyRoleGuards();
    }
  }, 0);
})();
</script>

<!-- AUTH_SYNC_V2 -->
<script>
(function(){
  try {
    const hasFirebaseUser = !!(window.__currentFirebaseUser && !window.__currentFirebaseUser.isAnonymous);
    const guestKey = localStorage.getItem('guestLookupKey') || localStorage.getItem('guestLookupKeyLegacy');
    const guestName = localStorage.getItem('guestName') || '비회원';
    const isGuestSession = !!guestKey;

    const userMenuStatus = document.getElementById('userMenuStatus');
    const btnMyPage = document.getElementById('userMenuGoMyPageBtn');
    const btnLogin = document.getElementById('userMenuGoLoginBtn');
    const btnLogout = document.getElementById('userMenuLogoutBtn');
    const btnGuestLookup = document.getElementById('guest-lookup-open');
    const welcomeMsg = document.getElementById('welcome-message');

    function safeShow(el){ if(el) el.style.display = 'block'; }
    function safeHide(el){ if(el) el.style.display = 'none'; }

    if (isGuestSession && !hasFirebaseUser) {
      if (userMenuStatus) {
        userMenuStatus.innerHTML =
          '<span class="font-bold text-slate-800">' + escapeHtml(guestName) + '</span>님<br>' +
          '<span class="text-xs text-slate-400">비회원 조회 세션이 유지 중입니다.</span>';
      }
      safeHide(btnLogin);
      safeHide(btnGuestLookup);
      safeShow(btnMyPage);
      safeShow(btnLogout);

      if (btnMyPage) btnMyPage.onclick = () => { const _k = localStorage.getItem('guestLookupKey') || sessionStorage.getItem('guestLookupKey') || localStorage.getItem('guestLookupKeyLegacy') || ''; location.href = _k ? 'mypage.html?guest=1' : 'mypage.html'; };

      if (btnLogout) {
        btnLogout.onclick = async () => {
          if (typeof window.hardLogout === 'function') {
            await window.hardLogout(location.pathname.split('/').pop() || 'index.html');
          } else {
            try{
              localStorage.removeItem('guestLookupKey');
              localStorage.removeItem('guestLookupKeyLegacy');
              localStorage.removeItem('guestName');
              localStorage.removeItem('guestContact');
              localStorage.removeItem('guestPwLast4');
            }catch(e){}
            location.replace('index.html');
          }
        };
      }

      if (welcomeMsg) {
        welcomeMsg.innerHTML = '<span class="font-semibold">' + escapeHtml(guestName) + '</span>님, 환영합니다!';
      }

      if (typeof window.updateAuthLabels === 'function') window.updateAuthLabels();
    }
  } catch(e) {
    console.warn('AUTH_SYNC_V2 failed:', e);
  }

  function escapeHtml(str){
    return String(str || '')
      .replaceAll('&','&amp;')
      .replaceAll('<','&lt;')
      .replaceAll('>','&gt;')
      .replaceAll('"','&quot;')
      .replaceAll("'","&#039;");
  }
})();
</script>
